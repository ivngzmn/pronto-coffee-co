services:
  - type: web
    name: pronto-coffee-api
    runtime: node
    plan: starter
    region: oregon
    buildCommand: npm install && npm run build:server
    startCommand: npm run start
    healthCheckPath: /api/health
    buildFilter:
      paths:
        - apps/server/**
        - package.json
        - package-lock.json
        - render.yaml
    envVars:
      - key: NODE_VERSION
        value: 24
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        sync: false
      - key: DB_STRING
        sync: false
      - key: APP_BASE_URL
        value: https://pronto-coffee-co.onrender.com
      - key: FRONTEND_APP_URL
        value: https://pronto-coffee-co-front-end.onrender.com
      - key: MARKETING_SITE_URL
        value: https://pronto-coffee-co-marketing.onrender.com
      - key: OAUTH_GOOGLE_CALLBACK_URL
        sync: false
      - key: OAUTH_GITHUB_CALLBACK_URL
        sync: false
      - key: OAUTH_FACEBOOK_CALLBACK_URL
        sync: false

  - type: web
    name: pronto-coffee-web
    runtime: static
    buildCommand: npm install && npm run build:web
    staticPublishPath: ./apps/web/dist
    buildFilter:
      paths:
        - apps/web/**
        - package.json
        - package-lock.json
        - render.yaml
    envVars:
      - key: NODE_VERSION
        value: 24
      - key: VITE_API_URL
        value: https://pronto-coffee-co.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  - type: web
    name: pronto-coffee-marketing
    runtime: static
    buildCommand: npm install && npm run build:marketing
    staticPublishPath: ./apps/marketing/dist
    buildFilter:
      paths:
        - apps/marketing/**
        - package.json
        - package-lock.json
        - render.yaml
    envVars:
      - key: NODE_VERSION
        value: 24
      - key: PUBLIC_APP_URL
        value: https://pronto-coffee-co-front-end.onrender.com
      - key: PUBLIC_API_URL
        value: https://pronto-coffee-co.onrender.com
